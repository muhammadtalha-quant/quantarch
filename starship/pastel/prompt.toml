palette = "pastel"

[username]
show_always = true
style_user = "bg:plum"
style_root = "bg:plum"
format = "[$user ]($style)"
disabled = false

[os]
style = "bg:plum"
disabled = false

[os.symbols]
Arch = "¾░Żć "

[directory]
style = "bg:blush"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "
"coding" = "¾░▓ŗ "
"code" = "¾░▓ŗ "
"development" = "¾░▓ŗ "

[cpp]
symbol = "ŅśØ "
style = "bg:#sky"
format = "[ $symbol ($version) ]($style)"

[docker_context]
symbol = "’īł "
style = "bg:coral_coast"
